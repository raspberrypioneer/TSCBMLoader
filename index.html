<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="js/index.js" defer></script>
    <script src="js/arduino.js" defer></script>
	<script src="js/serialtransport.js" defer></script>
	<script src="js/events.js" defer></script>
	<script src="js/prgdriver.js" defer></script>
	<script src="js/d64driver.js" defer></script>
	<script src="js/t64driver.js" defer></script>
	<script src="js/cbmloader.js" defer></script>
	<title>Commodore Loader</title>
	<link rel="icon" type="image/x-icon" href="./resources/favicon.ico">
</head>
<body>

	<section class="layout">
		<div class="header">
            <img id="logoImg" src="./resources/logo_home.png" alt="Logo">
		</div>
		<div class="rightHeader">
			<div id="progressBarDiv" class="progress-bar" style="display: none;">
				<div id="titleDiv"></div>
				<div id="progressDiv" class="progress"></div>
			</div>
		</div>
		<div class="leftSide">
			<img id="homeImg" src="./resources/logo_home.png" title="Home" alt="Home" class="action-btn">
			<br/>
			<img id="mediaPickIcon" src="./resources/files-empty.png" title="Open files" alt="Open files" class="action-btn">
            <input type="file" id="folderPicker" webkitdirectory directory multiple accept=".prg, .d64, .t64, .jpg, .json">
			<br/>
			<img id="connectIcon" src="./resources/usb-disconnected.png" title="Connect" alt="Connect" class="action-btn">
			<br/>
			<img id="webIcon" src="./resources/search-web.png" title="Search web" alt="Search web" class="action-btn">
		</div>
		<div class="body">
            <div class="card">
                <div id="tabsContainer" class="tabs-container"></div>
                <div class="search-container">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search" disabled>
                </div>
                <select id="mediaSelect" size="22" title="Select program"></select>
            </div>
		</div>
		<div class="rightSide" style="position: relative;">
            <img id="artImg" title="Program artwork" alt="Program artwork">
			<div id="directoryDiv" style="position: absolute; top: 8px; left: 16px; display: none;"></div>
		</div>
		<div class="footer">
			<div id="receivedMsgDiv" style="height: 30px; margin: 5px; text-align: center;"></div>
        </div>
        <div class="rightFooter">
            <div id="infoDiv" style="width: 400px; height: 30px; margin: 5px; text-align: center;"></div>
		</div>
	</section>

</body>
</html>
